server:
  port: ${PORT}

spring:
  datasource:
    driverClassName: com.microsoft.sqlserver.jdbc.SQLServerDriver
    jdbc-url: ${JDBC_URL:jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true;database=tempdb}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:s?u!ERe3i4ok=58drAsw}
    hikari:
      connection-timeout: 300000
